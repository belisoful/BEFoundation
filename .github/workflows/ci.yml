name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Test, and Validate Docs (macOS)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build framework
        run: |
          set -o pipefail
          xcodebuild -project BEFoundation.xcodeproj \
                     -scheme BEFoundation \
                     -configuration Debug \
                     -destination 'platform=macOS' \
                     CODE_SIGNING_ALLOWED=NO \
                     build

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild -project BEFoundation.xcodeproj \
                     -scheme BEFoundation \
                     -configuration Debug \
                     -destination 'platform=macOS' \
                     CODE_SIGNING_ALLOWED=NO \
                     test

      - name: Validate documentation catalog
        run: |
          set -o pipefail
          xcodebuild docbuild -project BEFoundation.xcodeproj \
                              -scheme BEFoundation \
                              -configuration Debug \
                              -destination 'platform=macOS' \
                              CODE_SIGNING_ALLOWED=NO

  ios-test:
    name: Tests (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests (iOS)
        run: |
          set -o pipefail
          # Resolve a concrete simulator id (not 'generic', which also builds the
          # x86_64 slice and fails on the framework's NEON intrinsics). Read it
          # from simctl, whose output is stable across Xcode versions, rather than
          # `xcodebuild -showdestinations`, whose format and eligibility filtering
          # vary. The trailing `|| true` keeps an empty result from aborting the
          # step under `set -o pipefail` before the diagnostics below can run.
          pick_ios_sim() {
            xcrun simctl list devices available \
              | awk '/^-- iOS/{f=1; next} /^-- /{f=0} f' \
              | grep -oiE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' \
              | head -1
          }
          ID=$(pick_ios_sim || true)
          if [ -z "$ID" ]; then
            echo "No iOS Simulator installed; downloading the iOS platform..."
            xcodebuild -downloadPlatform iOS || true
            ID=$(pick_ios_sim || true)
          fi
          if [ -z "$ID" ]; then
            echo "No available iOS Simulator. Diagnostics follow:"
            xcrun simctl list runtimes
            xcrun simctl list devices
            exit 1
          fi
          echo "Using simulator: $ID"
          xcodebuild test \
                     -project BEFoundation.xcodeproj \
                     -scheme BEFoundation \
                     -configuration Debug \
                     -destination "platform=iOS Simulator,id=$ID" \
                     CODE_SIGNING_ALLOWED=NO

  x86-test:
    name: Tests (macOS x86_64)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rosetta
        # macos-15 runners are Apple Silicon; the x86_64 test bundle runs under Rosetta.
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Run unit tests (x86_64)
        run: |
          set -o pipefail
          xcodebuild test \
                     -project BEFoundation.xcodeproj \
                     -scheme BEFoundation \
                     -configuration Debug \
                     -destination 'platform=macOS,arch=x86_64' \
                     CODE_SIGNING_ALLOWED=NO

  address-sanitizer:
    name: Tests under AddressSanitizer
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests with ASan
        run: |
          set -o pipefail
          xcodebuild -project BEFoundation.xcodeproj \
                     -scheme BEFoundation \
                     -configuration Debug \
                     -destination 'platform=macOS' \
                     -enableAddressSanitizer YES \
                     CODE_SIGNING_ALLOWED=NO \
                     test
