<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 526" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ah2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6E6E73"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="738" height="524" rx="14" fill="#FCFCFE" stroke="#D2D2D7"/>
  <text x="28" y="40" font-size="20" font-weight="700" fill="#1D1D1F">Priority-ordered notification delivery</text>
  <text x="28" y="62" font-size="13" fill="#6E6E73">Unix-style priority: −20 is highest (delivered first), 20 is lowest, 10 is the default.</text>

  <!-- poster + center -->
  <rect x="28" y="92" width="150" height="46" rx="10" fill="#1D1D1F"/>
  <text x="103" y="120" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">postNotification:</text>
  <path d="M178,115 L214,115" stroke="#6E6E73" stroke-width="1.6" marker-end="url(#ah2)"/>
  <rect x="214" y="92" width="262" height="46" rx="10" fill="#E9F1FF" stroke="#0A84FF"/>
  <text x="345" y="113" font-size="14" font-weight="600" fill="#0A5FCC" text-anchor="middle">NSPriorityNotificationCenter</text>
  <text x="345" y="130" font-size="11" fill="#0A5FCC" text-anchor="middle">sorts observers by ncPriority</text>

  <!-- ordered observers -->
  <text x="28" y="176" font-size="13" font-weight="600" fill="#1D1D1F">Observers, highest priority first</text>

  <!-- observer 1 -->
  <circle cx="48" cy="210" r="13" fill="#FF453A"/>
  <text x="48" y="214" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <rect x="74" y="190" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#FF453A"/>
  <text x="134" y="206" font-size="12" font-weight="600" fill="#C7261C" text-anchor="middle">priority −20</text>
  <text x="134" y="222" font-size="11" fill="#8E8E93" text-anchor="middle">highest</text>
  <path d="M194,210 L236,210" stroke="#6E6E73" stroke-width="1.4" marker-end="url(#ah2)"/>
  <rect x="236" y="190" width="240" height="40" rx="8" fill="#F0F0F2" stroke="#C7C7CC"/>
  <text x="356" y="214" font-size="12" fill="#1D1D1F" text-anchor="middle">sync: block(notif) + postBlock</text>

  <!-- observer 2 -->
  <circle cx="48" cy="266" r="13" fill="#FF9F0A"/>
  <text x="48" y="270" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <rect x="74" y="246" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#FF9F0A"/>
  <text x="134" y="262" font-size="12" font-weight="600" fill="#B5710A" text-anchor="middle">priority 0</text>
  <text x="134" y="278" font-size="11" fill="#8E8E93" text-anchor="middle">neutral</text>
  <path d="M194,266 L236,266" stroke="#6E6E73" stroke-width="1.4" marker-end="url(#ah2)"/>
  <rect x="236" y="246" width="240" height="40" rx="8" fill="#F0F0F2" stroke="#C7C7CC"/>
  <text x="356" y="270" font-size="12" fill="#1D1D1F" text-anchor="middle">sync: block(notif) + postBlock</text>

  <!-- observer 3 (queued) -->
  <circle cx="48" cy="322" r="13" fill="#8E8E93"/>
  <text x="48" y="326" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <rect x="74" y="302" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#8E8E93"/>
  <text x="134" y="318" font-size="12" font-weight="600" fill="#48484A" text-anchor="middle">priority 10</text>
  <text x="134" y="334" font-size="11" fill="#8E8E93" text-anchor="middle">default</text>
  <path d="M194,322 L236,322" stroke="#6E6E73" stroke-width="1.4" marker-end="url(#ah2)"/>
  <rect x="236" y="302" width="240" height="40" rx="8" fill="#F3ECFB" stroke="#BF5AF2"/>
  <text x="356" y="320" font-size="12" font-weight="600" fill="#8A2BE2" text-anchor="middle">queued: copy → async on queue</text>
  <text x="356" y="335" font-size="10.5" fill="#8A2BE2" text-anchor="middle">copy shares name/object/userInfo</text>

  <!-- observer 4 -->
  <circle cx="48" cy="378" r="13" fill="#6E6E73"/>
  <text x="48" y="382" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <rect x="74" y="358" width="120" height="40" rx="8" fill="#FFFFFF" stroke="#8E8E93"/>
  <text x="134" y="374" font-size="12" font-weight="600" fill="#48484A" text-anchor="middle">priority 20</text>
  <text x="134" y="390" font-size="11" fill="#8E8E93" text-anchor="middle">lowest</text>
  <path d="M194,378 L236,378" stroke="#6E6E73" stroke-width="1.4" marker-end="url(#ah2)"/>
  <rect x="236" y="358" width="240" height="40" rx="8" fill="#F0F0F2" stroke="#C7C7CC"/>
  <text x="356" y="382" font-size="12" fill="#1D1D1F" text-anchor="middle">sync: block(notif) + postBlock</text>

  <!-- order arrows down -->
  <path d="M48,223 L48,253" stroke="#C7C7CC" stroke-width="1.4" marker-end="url(#ah2)"/>
  <path d="M48,279 L48,309" stroke="#C7C7CC" stroke-width="1.4" marker-end="url(#ah2)"/>
  <path d="M48,335 L48,365" stroke="#C7C7CC" stroke-width="1.4" marker-end="url(#ah2)"/>

  <!-- reverse note -->
  <rect x="28" y="428" width="684" height="74" rx="10" fill="#FFFFFF" stroke="#C7C7CC"/>
  <text x="44" y="452" font-size="13" font-weight="600" fill="#1D1D1F">reverse = YES</text>
  <text x="44" y="472" font-size="12" fill="#6E6E73">Iterates the ordered observers back-to-front (lowest priority first).</text>
  <text x="44" y="490" font-size="12" fill="#6E6E73">Each notification's postBlock runs after every observer is delivered.</text>
</svg>
