<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 360" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ah7" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11" fill="none" stroke="#98989D" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="738" height="358" rx="14" fill="#131316" stroke="#3A3A3C"/>
  <text x="28" y="40" font-size="20" font-weight="700" fill="#F5F5F7">BEMutable protocol hierarchy</text>
  <text x="28" y="62" font-size="13" fill="#98989D">Base protocols for mutability and recursive copy, plus the collection variants built on them.</text>

  <!-- base protocols (top) -->
  <rect x="40" y="96" width="180" height="64" rx="11" fill="#2A1F40" stroke="#BF5AF2"/>
  <text x="130" y="122" font-size="14" font-weight="700" fill="#D29BFF" text-anchor="middle">BEHasMutable</text>
  <text x="130" y="142" font-size="11" fill="#98989D" text-anchor="middle">isMutable, -mutableCopy</text>

  <rect x="280" y="96" width="180" height="64" rx="11" fill="#2A1F40" stroke="#BF5AF2"/>
  <text x="370" y="122" font-size="14" font-weight="700" fill="#D29BFF" text-anchor="middle">BECollectionAbstract</text>
  <text x="370" y="142" font-size="11" fill="#98989D" text-anchor="middle">shared collection surface</text>

  <rect x="520" y="96" width="180" height="64" rx="11" fill="#2A1F40" stroke="#BF5AF2"/>
  <text x="610" y="122" font-size="14" font-weight="700" fill="#D29BFF" text-anchor="middle">BEMutable</text>
  <text x="610" y="142" font-size="11" fill="#98989D" text-anchor="middle">copyRecursive / mutableCopyRecursive</text>

  <!-- derived collections (bottom) -->
  <rect x="90" y="252" width="200" height="64" rx="11" fill="#11371F" stroke="#34C759"/>
  <text x="190" y="278" font-size="14" font-weight="700" fill="#5DD27A" text-anchor="middle">BECollection</text>
  <text x="190" y="298" font-size="11" fill="#98989D" text-anchor="middle">immutable collection</text>

  <rect x="450" y="252" width="200" height="64" rx="11" fill="#11371F" stroke="#34C759"/>
  <text x="550" y="278" font-size="14" font-weight="700" fill="#5DD27A" text-anchor="middle">BEMutableCollection</text>
  <text x="550" y="298" font-size="11" fill="#98989D" text-anchor="middle">mutable collection</text>

  <!-- conforms-to arrows -->
  <path d="M170,252 L132,162" stroke="#98989D" stroke-width="1.4" fill="none" marker-end="url(#ah7)"/>
  <path d="M250,252 L330,162" stroke="#98989D" stroke-width="1.4" fill="none" marker-end="url(#ah7)"/>
  <path d="M500,252 L412,162" stroke="#98989D" stroke-width="1.4" fill="none" marker-end="url(#ah7)"/>
  <path d="M572,252 L608,162" stroke="#98989D" stroke-width="1.4" fill="none" marker-end="url(#ah7)"/>

  <!-- legend -->
  <line x1="500" y1="338" x2="528" y2="338" stroke="#98989D" stroke-width="1.4" marker-end="url(#ah7)"/>
  <text x="536" y="342" font-size="12" fill="#98989D">conforms to</text>
</svg>
