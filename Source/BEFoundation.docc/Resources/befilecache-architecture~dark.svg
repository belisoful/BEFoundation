<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 470" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ah3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#98989D"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="738" height="468" rx="14" fill="#131316" stroke="#3A3A3C"/>
  <text x="28" y="40" font-size="20" font-weight="700" fill="#F5F5F7">BEFileCache architecture</text>
  <text x="28" y="62" font-size="13" fill="#98989D">A fast in-memory tier over a durable on-disk tier, indexed for O(1) cold start.</text>

  <!-- API -->
  <rect x="36" y="92" width="150" height="40" rx="9" fill="#48484A"/>
  <text x="111" y="117" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">setObject:forKey:</text>
  <rect x="36" y="300" width="150" height="40" rx="9" fill="#48484A"/>
  <text x="111" y="325" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">objectForKey:</text>

  <!-- memory tier -->
  <rect x="250" y="84" width="210" height="120" rx="12" fill="#0A2A4D" stroke="#0A84FF"/>
  <text x="355" y="110" font-size="14" font-weight="700" fill="#6FB6FF" text-anchor="middle">Memory tier</text>
  <text x="355" y="130" font-size="12" fill="#6FB6FF" text-anchor="middle">NSCache (speed)</text>
  <text x="355" y="156" font-size="11" fill="#0A84FF" text-anchor="middle">count / cost limits</text>
  <text x="355" y="176" font-size="11" fill="#0A84FF" text-anchor="middle">NSDiscardableContent aware</text>

  <!-- disk tier -->
  <rect x="510" y="84" width="200" height="232" rx="12" fill="#11371F" stroke="#34C759"/>
  <text x="610" y="110" font-size="14" font-weight="700" fill="#5DD27A" text-anchor="middle">Disk tier</text>
  <text x="610" y="128" font-size="11" fill="#5DD27A" text-anchor="middle">cacheDirectory</text>
  <rect x="528" y="142" width="164" height="40" rx="8" fill="#232327" stroke="#34C759"/>
  <text x="610" y="160" font-size="12" font-weight="600" fill="#5DD27A" text-anchor="middle">&lt;hash&gt;.cache</text>
  <text x="610" y="175" font-size="10.5" fill="#8E8E93" text-anchor="middle">archived object payload</text>
  <rect x="528" y="190" width="164" height="44" rx="8" fill="#232327" stroke="#34C759"/>
  <text x="610" y="208" font-size="12" font-weight="600" fill="#5DD27A" text-anchor="middle">&lt;hash&gt;.meta</text>
  <text x="610" y="223" font-size="10.5" fill="#8E8E93" text-anchor="middle">key, cost, retentionCost, date</text>
  <rect x="528" y="242" width="164" height="44" rx="8" fill="#232327" stroke="#34C759"/>
  <text x="610" y="260" font-size="12" font-weight="600" fill="#5DD27A" text-anchor="middle">BEFileCacheIndex</text>
  <text x="610" y="275" font-size="10.5" fill="#8E8E93" text-anchor="middle">rebuilds metadata at launch</text>

  <!-- writes -->
  <path d="M186,112 L246,126" stroke="#0A84FF" stroke-width="1.8" marker-end="url(#ah3)"/>
  <text x="196" y="104" font-size="11" fill="#6FB6FF">write</text>
  <path d="M460,118 L508,132" stroke="#34C759" stroke-width="1.8" marker-end="url(#ah3)"/>
  <text x="463" y="111" font-size="10" fill="#5DD27A">persist</text>

  <!-- reads -->
  <path d="M186,314 L300,206" stroke="#98989D" stroke-width="1.6" marker-end="url(#ah3)"/>
  <text x="206" y="262" font-size="11" fill="#98989D">read</text>
  <path d="M460,186 L508,200" stroke="#98989D" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah3)"/>
  <text x="461" y="180" font-size="10" fill="#8E8E93">on miss</text>

  <!-- launch / reconcile -->
  <rect x="36" y="372" width="674" height="74" rx="10" fill="#232327" stroke="#48484A"/>
  <text x="52" y="396" font-size="13" font-weight="600" fill="#F5F5F7">Cold start</text>
  <text x="52" y="416" font-size="12" fill="#98989D">loadIndex rebuilds metadata from BEFileCacheIndex (no payloads read).</text>
  <text x="52" y="434" font-size="12" fill="#98989D">A reconciliation pass adopts crash-orphaned .cache/.meta pairs and deletes stray files.</text>
</svg>
