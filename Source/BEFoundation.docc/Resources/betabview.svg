<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 320" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="aht" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6E6E73"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="738" height="318" rx="14" fill="#FCFCFE" stroke="#D2D2D7"/>
  <text x="28" y="40" font-size="20" font-weight="700" fill="#1D1D1F">BETabView — hideable tabs</text>
  <text x="28" y="62" font-size="13" fill="#6E6E73">Setting a tab item's hidden property removes it from the bar while keeping its order.</text>

  <!-- tab bar -->
  <rect x="178" y="92" width="384" height="40" rx="9" fill="#FFFFFF" stroke="#C7C7CC"/>
  <rect x="180" y="94" width="126" height="36" rx="8" fill="#E9F1FF"/>
  <line x1="306" y1="100" x2="306" y2="124" stroke="#E5E5EA"/>
  <line x1="434" y1="100" x2="434" y2="124" stroke="#E5E5EA"/>
  <text x="243" y="116" font-size="13" font-weight="600" fill="#0A5FCC" text-anchor="middle">General</text>
  <text x="370" y="116" font-size="13" fill="#1D1D1F" text-anchor="middle">Advanced</text>
  <text x="498" y="116" font-size="13" fill="#1D1D1F" text-anchor="middle">Privacy</text>

  <!-- content area -->
  <rect x="178" y="140" width="384" height="118" rx="10" fill="#FFFFFF" stroke="#C7C7CC"/>
  <text x="370" y="204" font-size="13" fill="#8E8E93" text-anchor="middle">General settings…</text>

  <!-- hidden tab annotation -->
  <rect x="178" y="276" width="150" height="30" rx="8" fill="#F0F0F2" stroke="#8E8E93" stroke-dasharray="4 3"/>
  <text x="253" y="296" font-size="12.5" fill="#48484A" text-anchor="middle" text-decoration="line-through">Network</text>
  <text x="346" y="296" font-size="12.5" font-weight="600" fill="#1D1D1F" font-family="ui-monospace, 'SF Mono', Menlo, monospace">networkTab.hidden = YES</text>
  <path d="M300,272 C320,250 380,200 420,160" fill="none" stroke="#6E6E73" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#aht)"/>
  <text x="430" y="150" font-size="11" fill="#8E8E93">removed from the bar</text>
</svg>
